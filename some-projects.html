<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Some Projects — Anfisa Utkina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#0F1023;
      --ink-2:#3A3D55;
      --muted:#7A7E94;
      --bg:#ffffff;
      --card:#ffffff;
      --sky:#5FC0E8;
      --radius-pill:999px;
      --radius-card:18px;
      --font:'Inter','Helvetica Neue',Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    .page{position:relative;min-height:100vh}
    .container{max-width:1200px;margin:0 auto;padding:32px 40px 120px}

    /* ===== Top bar ===== */
    .topbar{
      display:flex; align-items:center; gap:12px;
      margin-bottom:80px;
    }
    .topbar .cv{
      font-weight:700; font-size:13px;
      letter-spacing:.04em;
      padding:6px 8px;
    }
    .pill-tg{
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--sky); color:#fff;
      font-weight:600; font-size:13px;
      padding:8px 16px; border-radius:999px;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .pill-tg:hover{ transform: translateY(-1px); box-shadow: 0 12px 30px rgba(95,192,232,.35); }
    .pill-home{
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      background:#C9F63F; color:var(--ink);
      font-weight:700; font-size:13px;
      padding:8px 16px; border-radius:999px;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .pill-home:hover{ transform: translateY(-1px); box-shadow: 0 12px 30px rgba(201,246,63,.45); }

    /* ===== Page label ===== */
    .page-label{
      text-align:center;
      font-weight:800;
      font-size:28px;
      letter-spacing:.02em;
      margin-bottom:90px;
      color:var(--ink);
      text-transform:uppercase;
    }

    /* ===== Image grids ===== */
    .grid{
      display:grid; gap:24px;
      margin: 24px 0;
      align-items: start;
    }
    .grid-3{ grid-template-columns: repeat(3,1fr); }
    .grid-2{ grid-template-columns: repeat(2,1fr); }
    /* KARTEL первый ряд: широкая левая колонка + 2 равные правее, всё прижато к низу */
    .grid-kartel{
      grid-template-columns: 1.34fr 1fr 1fr;
      align-items: end;
    }
    .grid-kartel > .card{ align-self: end; }
    .grid-kartel > .stack{ align-self: stretch; }
    .stack{
      display:flex; flex-direction:column; justify-content:space-between;
    }
    .card{
      align-self: start;
      overflow: hidden;
      border-radius: var(--radius-card);
    }
    .card img{
      width:100%;
      height:auto;
      display:block;
      border-radius: var(--radius-card);
    }

    /* ===== Section spacing ===== */
    .section{ margin: 24px 0; }
    .section + .section{ margin-top: 64px; }

    /* ===== Roll-ups subtitle ===== */
    .subhead{
      font-size:18px;
      font-weight:700;
      letter-spacing:.01em;
      color:var(--ink);
      margin: 0 0 18px;
    }

    /* ===== Responsive ===== */
    @media (max-width:900px){
      .container{ padding: 24px 20px 80px; }
      .grid-3, .grid-2, .grid-kartel{ grid-template-columns:1fr; align-items:start; }
      .topbar{ margin-bottom:48px; }
      .page-label{ margin-bottom:50px; }
      .section + .section{ margin-top: 40px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="container">

      <!-- Top bar -->
      <header class="topbar">
        <a class="pill-home" href="index.html" aria-label="Вернуться на главную">← Домой</a>
        <a class="cv" href="index.html">CV</a>
        <a class="pill-tg" href="https://t.me/" target="_blank" rel="noopener">Написать в тг</a>
      </header>

      <!-- Page label -->
      <div class="page-label">Some Projects</div>

      <!-- ===== KARTEL ===== -->
      <section class="section">
        <div class="grid grid-kartel">
          <div class="card"><img src="assets/some-projects/image.png" alt="KARTEL — витрина магазина"></div>
          <div class="card"><img src="assets/some-projects/image-1.png" alt="KARTEL — худи на вешалках"></div>
          <div class="stack">
            <div class="card"><img src="assets/some-projects/image-2.png" alt="KARTEL — стакан с фирменным знаком"></div>
            <div class="card"><img src="assets/some-projects/image-3.png" alt="KARTEL — настенная роспись"></div>
          </div>
        </div>
        <div class="grid grid-2">
          <div class="card"><img src="assets/some-projects/kosmo-jackets.png" alt="KARTEL — серебристые куртки"></div>
          <div class="card"><img src="assets/some-projects/kartel-bag.png" alt="KARTEL — прозрачная сумка"></div>
        </div>
      </section>

      <!-- ===== Joki Joya: коробка + промо ===== -->
      <section class="section">
        <div class="grid grid-2">
          <div class="card"><img src="assets/some-projects/box.png" alt="Joki Joya — коробка «Мнемониксы»"></div>
          <div class="card"><img src="assets/some-projects/joki-promo.png" alt="Joki Joya — постер «Мир вокруг нас»"></div>
        </div>
      </section>

      <!-- ===== Roll-ups ===== -->
      <section class="section">
        <h2 class="subhead">Roll-ups</h2>
        <div class="grid grid-3">
          <div class="card"><img src="assets/some-projects/rollup-1.png" alt="Joki Joya — ролл-ап 1"></div>
          <div class="card"><img src="assets/some-projects/rollup-2.png" alt="Joki Joya — ролл-ап 2"></div>
          <div class="card"><img src="assets/some-projects/rollup-3.png" alt="Joki Joya — ролл-ап 3"></div>
        </div>
      </section>

    </div>
  </main>
</body>
</html>
