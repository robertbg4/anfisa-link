<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anfisa Utkina — Art Director Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --blue-bg:#010029;
      --blue-glow:#1E22E8;
      --navy:#05082A;
      --lime:#C9F63F;
      --sky:#5FC0E8;
      --white:#fff;
      --grid-line:rgba(255,255,255,.05);
      --font:'Inter','Helvetica Neue',Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:var(--font);background:var(--blue-bg);color:var(--white);-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    /* ===== Snap scroll host ===== */
    html{
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }
    body{ overflow-x:hidden; }

    /* ===== Screen (section) ===== */
    .screen{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background: var(--blue-bg);
    }
    .screen::before{
      content:"";
      position:absolute; inset:0;
      background-image: linear-gradient(to right, var(--grid-line) 1px, transparent 1px);
      background-size: calc(100%/8) 100%;
      pointer-events:none; z-index:2;
    }

    /* Blue glow backdrop (uses the Ellipse PNG for textured blur) */
    .glow{
      position:absolute;
      pointer-events:none;
      z-index:0;
      opacity:.85;
      filter: blur(40px) saturate(1.2);
    }
    .glow img{
      width:100%; height:100%;
      display:block;
      object-fit: fill;
    }
    .glow--hero{
      top: 8%;
      left: 8%;
      width: 70%;
      height: 80%;
    }
    .glow--cats{
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      height: 62%;
    }

    /* ===== Top bar (shared) ===== */
    .topbar{
      position:absolute;
      top:22px; left:28px;
      display:flex; align-items:center; gap:10px;
      z-index:5;
    }
    .cv{
      color:var(--white);
      font-weight:700;
      font-size:12px;
      letter-spacing:.04em;
      padding:4px 6px;
    }
    .pill-tg-sm{
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--sky); color:var(--white);
      font-weight:600; font-size:11px;
      padding:6px 12px; border-radius:999px;
    }

    /* ===== Screen 1 — Hero ===== */
    .hero{
      position:relative;
      z-index:1;
      height:100%;
      max-width:1500px;
      margin:0 auto;
      padding: 0 60px;
      display:grid;
      grid-template-columns: 1fr 40%;
      align-items:center;
      gap: 0;
    }
    .hero__left{
      position:relative;
      align-self:center;
    }
    .name{
      position:relative;
      font-weight:900;
      line-height:.88;
      letter-spacing:-.02em;
      text-transform:uppercase;
      color:var(--white);
      margin:0;
      font-size: clamp(80px, 14vw, 220px);
      display:inline-block;
    }
    .name .line-1,
    .name .line-2{ display:block; position:relative; }

    /* lime badges — anchored relative to the name block */
    .badge{
      position:absolute;
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--lime);
      color:var(--navy);
      font-weight:800;
      text-transform:uppercase;
      border-radius:999px;
      box-shadow: 0 8px 22px rgba(0,0,0,.25);
      white-space:nowrap;
      letter-spacing:.01em;
      z-index:3;
    }
    .badge--art{
      top: -6%;
      left: 1%;
      padding: 14px 32px;
      font-size: clamp(18px, 2vw, 30px);
      transform: rotate(-7deg);
    }
    .badge--graphic{
      top: 36%;
      left: 46%;
      padding: 14px 32px;
      font-size: clamp(18px, 2vw, 30px);
      transform: rotate(6deg);
    }
    .badge--years{
      top: 100%;
      left: 50%;
      transform: translate(-50%, 24px);
      padding: 12px 28px;
      font-size: clamp(16px, 1.6vw, 24px);
    }

    .hero__right{
      position:relative;
      height:100%;
      display:flex;
      justify-content:flex-end;
      align-items:stretch;
      padding: 4vh 0;
    }
    .hero__photo{
      width:100%;
      max-width: 560px;
      height: 100%;
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
    }
    .hero__photo img{
      width:100%;
      height:100%;
      object-fit:contain;
      object-position: top right;
      display:block;
      filter: drop-shadow(0 20px 50px rgba(0,0,0,.35));
    }

    /* ===== Screen 2 — Categories ===== */
    .cats-screen{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding: 60px;
    }
    .cats{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:28px;
      position:relative; z-index:1;
    }
    .cats__row{
      display:flex;
      gap:28px;
      flex-wrap:wrap;
      justify-content:center;
    }
    .cat{
      position:relative;
      overflow:hidden;
      background:var(--white);
      color:var(--navy);
      font-weight:800;
      text-transform:uppercase;
      padding:28px 54px;
      border-radius:999px;
      font-size: clamp(20px, 1.9vw, 32px);
      letter-spacing:.02em;
      transition: transform .2s ease, box-shadow .2s ease;
      display:inline-block;
    }
    .cat:hover{ transform: translateY(-3px); box-shadow: 0 14px 28px rgba(0,0,0,.25); }

    .cat__soon{
      position:absolute;
      top:18px;
      right:-38px;
      width:140px;
      padding:5px 0;
      background:var(--lime);
      color:var(--navy);
      font-weight:800;
      font-size:12px;
      letter-spacing:.1em;
      text-transform:uppercase;
      text-align:center;
      transform: rotate(45deg);
      pointer-events:none;
      z-index:2;
    }

    .cats-cta{
      margin-top: 90px;
      display:flex; justify-content:center;
      position:relative; z-index:1;
    }
    .pill-tg-lg{
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--sky); color:var(--white);
      font-weight:600; font-size:22px;
      padding: 20px 46px;
      border-radius:999px;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .pill-tg-lg:hover{ transform: translateY(-2px); box-shadow: 0 14px 32px rgba(95,192,232,.35); }

    /* scroll hint down arrow */
    .scroll-hint{
      position:absolute;
      bottom:24px; left:50%;
      transform: translateX(-50%);
      opacity:.6;
      font-size:12px;
      letter-spacing:.1em;
      text-transform:uppercase;
      animation: bob 2s ease-in-out infinite;
      z-index:2;
    }
    @keyframes bob{
      0%,100%{ transform: translate(-50%, 0); }
      50%{ transform: translate(-50%, 6px); }
    }

    /* ===== Responsive ===== */
    @media (max-width: 900px){
      html{ scroll-snap-type: none; }
      .screen{ height: auto; min-height: 100vh; }
      .hero{
        grid-template-columns: 1fr;
        padding: 80px 24px 60px;
        gap: 40px;
      }
      .hero__right{ justify-content:center; padding-top:0; }
      .hero__photo{ max-width: 300px; }
      .badge--art{ top:4%; left:2%; }
      .badge--graphic{ top:42%; left:48%; }
      .badge--years{ top:70%; left:20%; }
      .cats-screen{ padding: 80px 24px; }
      .cat{ font-size:16px; padding:14px 26px; }
    }
  </style>
</head>
<body>

  <!-- ===== Screen 1 — Hero ===== -->
  <section class="screen" id="screen-1">
    <div class="glow glow--hero"><img src="assets/blob-blue.png" alt=""></div>
    <header class="topbar">
      <a class="cv" href="#cv">CV</a>
      <a class="pill-tg-sm" href="https://t.me/" target="_blank" rel="noopener">Написать в тг</a>
    </header>

    <div class="hero">
      <div class="hero__left">
        <h1 class="name">
          <span class="line-1">Anfisa</span>
          <span class="line-2">Utkina</span>
          <span class="badge badge--art">Art Direction</span>
          <span class="badge badge--graphic">Graphic Design</span>
          <span class="badge badge--years">10+ Years</span>
        </h1>
      </div>
      <div class="hero__right">
        <div class="hero__photo">
          <img src="assets/hero-photo.png" alt="Anfisa Utkina">
        </div>
      </div>
    </div>

    <div class="scroll-hint">Scroll ↓</div>
  </section>

  <!-- ===== Screen 2 — Categories ===== -->
  <section class="screen cats-screen" id="screen-2">
    <div class="glow glow--cats"><img src="assets/blob-blue-2.png" alt=""></div>
    <nav class="cats" aria-label="Категории работ">
      <div class="cats__row">
        <a class="cat" href="branding.html">Branding</a>
        <a class="cat" href="books.html">Books</a>
        <a class="cat" href="some-projects.html">Some Projects</a>
      </div>
      <div class="cats__row">
        <a class="cat" href="#motion">Motion graphics<span class="cat__soon">Soon</span></a>
        <a class="cat" href="ui-ux.html">UI/UX</a>
      </div>
    </nav>

    <div class="cats-cta">
      <a class="pill-tg-lg" href="https://t.me/" target="_blank" rel="noopener">Написать в тг</a>
    </div>
  </section>

</body>
</html>
